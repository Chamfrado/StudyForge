services:
  postgres-test:
    image: postgres:16
    container_name: studyforge-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: studyforge_test
      POSTGRES_USER: studyforge
      POSTGRES_PASSWORD: studyforge
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyforge -d studyforge_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - studyforge_postgres_test_data:/var/lib/postgresql/data

volumes:
  studyforge_postgres_test_data:
