services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - api/.env
    environment:
      APP_MODE: development
      DATABASE_URL: postgresql+asyncpg://studyforge:studyforge@postgres:5432/studyforge
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./web:/app/web
      - ./api/storage:/app/api/storage
      - studyforge_web_node_modules:/app/web/node_modules
      - studyforge_web_next:/app/web/.next
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: studyforge
      POSTGRES_USER: studyforge
      POSTGRES_PASSWORD: studyforge
    ports:
      - "5433:5432"
    volumes:
      - studyforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyforge -d studyforge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  studyforge_postgres_data:
  studyforge_web_node_modules:
  studyforge_web_next:
